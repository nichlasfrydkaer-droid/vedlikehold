<body data-page="login">

<div class="container">

    <div class="card">

        <h1>Dashboard</h1>

        <div class="field">

            <label>E-mail</label>

            <input
                id="email"
                type="email"
                autocomplete="email"
            >

        </div>

        <div class="field">

            <label>Adgangskode</label>

            <input
                id="password"
                type="password"
                autocomplete="current-password"
            >

        </div>

        <button id="loginBtn">

            Log ind

        </button>

        <div id="status"></div>

    </div>

</div>

<script type="module" src="/dashboard/js/app.js"></script>

</body>
