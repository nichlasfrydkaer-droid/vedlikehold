<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedlikeholdssystem</title>
<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vedlikeholdssystem">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  margin:0;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
h1{
  text-align:center;
}
ul{
  list-style:none;
  padding:0;
}
li{
  margin:12px 0;
}
a{
  display:block;
  padding:15px;
  background:#28a745;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}
a:hover{
  opacity:.9;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
<h1>Vedlikeholdssystem</h1>
<p>Velg jobbkort:</p>
<ul id="jobList"></ul>
  </div>
</div>
  <script>
async function loadJobs() {

  const response =
    await fetch("/jobdata/index.json");

  const jobs =
    await response.json();

  const list =
    document.getElementById("jobList");

  jobs
    .sort((a,b) =>
      Number(a.nummer) - Number(b.nummer)
    )
    .forEach(job => {

      const li =
        document.createElement("li");

      li.innerHTML = `
        <a href="/jobbkort-menu.html?id=${job.nummer}">
          Jobbkort ${job.nummer} - ${job.titel}
        </a>
      `;

      list.appendChild(li);

    });

}

loadJobs();
</script>
</body>
</html>
