<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedlikeholdssystem</title>

<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
  id="appleAppTitle"
  name="apple-mobile-web-app-title"
  content="Vedlikeholdssystem">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
  text-align:center;
  font-size:48px;
  line-height:1.1;
  margin:0 0 30px;
}

.selectBox{
  margin:25px 0;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

select{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
}

ul{
  list-style:none;
  padding:0;
}

li{
  margin:12px 0;
}

a{
  display:block;
  padding:15px;
  background:#28a745;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

a:hover{
  opacity:.9;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1 id="systemTitle">Vedlikeholdssystem</h1>

<div class="selectBox">

<label id="selectCongregationLabel">Velg menighet</label>

<select id="congregationSelect"></select>

</div>

<p id="selectJobLabel">Velg jobbkort:</p>

<ul id="jobList"></ul>

</div>

</div>

<script>

let selectedCongregation = "";
let currentCongregation = null;
let translations = null;
  
function fitSystemTitle(){

  const title =
    document.getElementById("systemTitle");

  title.style.fontSize = "";

  let size =
    parseFloat(
      getComputedStyle(title).fontSize
    );

  while(
    title.scrollWidth > title.clientWidth &&
    size > 14
  ){

    size -= 0.5;

    title.style.fontSize =
      size + "px";

  }

}

async function loadTranslations(language){

  let response =
    await fetch(`/lang/${language}.json`);

  if(!response.ok){

    response =
      await fetch("/lang/no.json");

  }

  translations =
    await response.json();

document.title =

  translations.systemTitle;

document

  .getElementById("appleAppTitle")

  .setAttribute(

    "content",

    translations.systemTitle

  );

  document.getElementById("systemTitle").innerText =
  translations.systemTitle;

requestAnimationFrame(fitSystemTitle);

  document.getElementById("selectCongregationLabel").innerText =
    translations.selectCongregation;

  document.getElementById("selectJobLabel").innerText =
    translations.selectJob + ":";

}

async function loadCongregations(){

const response = await fetch(
  "https://api.vedlikeholdsystem.no/congregations?t=" + Date.now(),
  {
    cache: "no-store"
  }
);

  const congregations =
    await response.json();

  const select =
    document.getElementById("congregationSelect");

  select.innerHTML = "";

  congregations
    .filter(c => c.active !== false)
    .sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(c=>{

      const option =
        document.createElement("option");

      option.value = c.id;
      option.textContent = c.name;

      select.appendChild(option);

    });

  const saved =
    localStorage.getItem("congregation");

  if(saved && congregations.some(c=>c.id===saved)){

    select.value = saved;

  }

  selectedCongregation =
    select.value;

  currentCongregation =
    congregations.find(
      c => c.id === selectedCongregation
    ) || null;

    localStorage.setItem(
  "congregationData",
  JSON.stringify(currentCongregation)
);

    await loadTranslations(
  currentCongregation?.language || "no"
);

  select.onchange = async ()=>{

    selectedCongregation =
      select.value;

    currentCongregation =
      congregations.find(
        c => c.id === selectedCongregation
      ) || null;

      localStorage.setItem(
  "congregationData",
  JSON.stringify(currentCongregation)
);

      await loadTranslations(
  currentCongregation?.language || "no"
);

    localStorage.setItem(
      "congregation",
      selectedCongregation
    );

    await loadJobs();

  };

}

async function loadJobs(){

  const language =
    currentCongregation?.language || "no";

  let response =
    await fetch(`/jobdata/${language}/index.json`);

if(!response.ok){

  throw new Error("Jobblisten finnes ikke for dette språket.");

}

  const jobs =
    await response.json();

  const list =
    document.getElementById("jobList");

  list.innerHTML = "";

jobs
  .filter(job => {

    if(!currentCongregation?.jobCards){

      return true;

    }

    return currentCongregation.jobCards.includes(job.nummer);

  })

  .sort((a,b)=>{

      const na =
        parseInt(a.nummer);

      const nb =
        parseInt(b.nummer);

      if(na !== nb){
        return na-nb;
      }

      return a.nummer.localeCompare(b.nummer);

    })

    .forEach(job=>{

      const li =
        document.createElement("li");

      li.innerHTML = `
<a href="/jobbkort-menu.html?id=${job.nummer}&congregation=${selectedCongregation}">
${translations.jobCard} ${job.nummer} - ${job.titel}
</a>
`;

      list.appendChild(li);

    });

}

window.addEventListener(
  "resize",
  fitSystemTitle
);

(async()=>{

  await loadCongregations();

  await loadJobs();

})();

</script>

</body>
</html>
