<script>

let selectedCongregation = "";
let currentCongregation = null;

async function loadCongregations(){

  const response =
    await fetch(
      "https://jobbkort-mail-v2.nichlasfrydkaer.workers.dev/congregations"
    );

  const congregations =
    await response.json();

  const select =
    document.getElementById("congregationSelect");

  congregations
    .filter(c => c.active !== false)
    .sort((a,b)=>a.name.localeCompare(b.name))
    .forEach(c=>{

      const option =
        document.createElement("option");

      option.value = c.id;
      option.textContent = c.name;

      select.appendChild(option);

    });

  const saved =
    localStorage.getItem("congregation");

  if(saved){

    select.value = saved;

  }

  selectedCongregation =
    select.value;

  currentCongregation =
    congregations.find(
      c => c.id === selectedCongregation
    ) || null;

  select.onchange = ()=>{

    selectedCongregation =
      select.value;

    currentCongregation =
      congregations.find(
        c => c.id === selectedCongregation
      ) || null;

    localStorage.setItem(
      "congregation",
      selectedCongregation
    );

    loadJobs();

  };

}

async function loadJobs(){

  const language =
    currentCongregation?.language || "no";

  let response =
    await fetch(`/jobdata/${language}/index.json`);

  if(!response.ok){

    response =
      await fetch("/jobdata/no/index.json");

  }

  const jobs =
    await response.json();

  const list =
    document.getElementById("jobList");

  list.innerHTML = "";

  jobs
    .sort((a,b)=>
      Number(a.nummer)-Number(b.nummer)
    )
    .forEach(job=>{

      const li =
        document.createElement("li");

      li.innerHTML = `
<a href="/jobbkort-menu.html?id=${job.nummer}&congregation=${selectedCongregation}">
Jobbkort ${job.nummer} - ${job.titel}
</a>
`;

      list.appendChild(li);

    });

}

(async ()=>{

  await loadCongregations();

  await loadJobs();

})();

</script>
