<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rapport sendt</title>

<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
  id="appleAppTitle"
  name="apple-mobile-web-app-title"
  content="Rapport sendt">
<meta
  name="apple-mobile-web-app-status-bar-style"
  content="default">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
}

.container{
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);

  max-width:500px;
  width:90%;

  text-align:center;
}

.check{
  font-size:90px;
  color:#28a745;
  line-height:1;
  margin-bottom:20px;
}

h1{
  margin:0 0 15px;
  color:#222;
  font-size:32px;
}

p{
  margin:0;
  color:#555;
  font-size:18px;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

  <div class="check">✓</div>

  <h1 id="title">
    Rapport sendt!
  </h1>

  <p id="text">
    Rapporten er sendt til vedlikeholdssystemet.
    <br><br>
    Du kan nå lukke siden.
  </p>

</div>

<script>

let translations = null;

async function loadPage(){

  const params =
    new URLSearchParams(window.location.search);

  const congregation =
    params.get("congregation");

  let language = "no";

  if(congregation){

    const congregationResponse =
      await fetch(
        "https://jobbkort-mail-v2.nichlasfrydkaer.workers.dev/congregations"
      );

    const congregations =
      await congregationResponse.json();

    const currentCongregation =
      congregations.find(
        c => c.id === congregation
      );

    language =
      currentCongregation?.language || "no";

  }

  let response =
    await fetch(`/lang/${language}.json`);

  if(!response.ok){

    response =
      await fetch("/lang/no.json");

  }

  translations =
    await response.json();

  document.title =
    translations.reportSent;

  document
    .getElementById("appleAppTitle")
    .setAttribute(
      "content",
      translations.reportSent
    );

  document.getElementById("title").innerText =
    translations.reportSent;

  document.getElementById("text").innerHTML =
    `${translations.reportSentText}<br><br>${translations.closePage}`;

}

loadPage();

</script>

</body>
</html>
