<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapport sendt</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;
}

.container{
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);

  max-width:500px;
  width:90%;

  text-align:center;
}

.check{
  font-size:90px;
  color:#28a745;
  line-height:1;
  margin-bottom:20px;
}

h1{
  margin:0 0 15px;
  color:#222;
  font-size:32px;
}

p{
  margin:0;
  color:#555;
  font-size:18px;
  line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

  <div class="check">✓</div>

  <h1>Rapport sendt!</h1>

  <p>
    Rapporten er sendt til vedlikeholdssystemet.
    <br><br>
    Du kan nå lukke siden.
  </p>

</div>

</body>
</html>
