<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobbkort</title>
<style>
*{
  box-sizing:border-box;
}
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f4f6f8;
  padding-bottom:120px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}
.section{
  margin-top:20px;
  padding-bottom:15px;
  border-bottom:1px solid #ddd;
}
input[type="text"],
textarea{
  width:100%;
  max-width:100%;
  padding:12px;
  font-size:16px;
  border:2px solid #ccc;
  border-radius:6px;
}

textarea{
  min-height:100px;
  resize:none;
  overflow:hidden;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
#startBtn{
  background:#2563eb;
  color:white;
}

#finishBtn{
  background:#28a745;
  color:white;
  display:none;
}
.notesInfo{
  font-size:14px;
  line-height:1.4;
  margin-bottom:10px;
  padding:10px;
  background:#f8f9fa;
  border-left:4px solid #28a745;
}
label{
  display:block;
  margin:10px 0;
  line-height:1.4;
}
.pulse{
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}
#preview{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
.previewItem{
  position:relative;
}
.previewItem img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}
.removeBtn{
  position:absolute;
  top:5px;
  right:5px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
}
#status{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.actionBar{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:100%;
  max-width:900px;
  padding:12px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  box-shadow:0 -4px 20px rgba(0,0,0,.12);
  z-index:999;
}

.actionBar button{
  width:100%;
  margin:0;
  border-radius:14px;
  font-size:18px;
  padding:18px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>
<div class="container">
<h1 id="jobTitle">Laster...</h1>
<div class="section">
  <strong>Frekvens:</strong>
  <span id="frequency"></span>
</div>
<div class="section">
  <strong>Tid brukt</strong>
  <input type="text" id="timeInput" disabled>
</div>
<div class="section">
  <strong>Navn</strong>
  <input type="text" id="nameInput" disabled>
</div>
<div class="section">
  <div class="notesInfo" id="merkText"></div>

<strong>Kontrolliste</strong>

  <div id="taskContainer"></div>
</div>
<div class="section">

<strong>Notater</strong>

  <div class="notesInfo" id="notatInfo"></div>
  <textarea id="notes" disabled></textarea>
</div>
<div class="section">

  <strong>Bilder</strong>

  <input

    type="file"

    id="photos"

    multiple

    accept="image/*"

    disabled

  >

  <div id="preview"></div>

</div>
<div id="status"></div>
</div>

<div class="actionBar">

  <button id="startBtn" class="pulse">
    ▶ Start arbeidet
  </button>

  <button id="finishBtn">
    ✓ Ferdigmeld
  </button>

</div>

<script>
let currentJob = null;
let startTime = null;
let timerInterval = null;
let selectedPhotos = [];
async function loadJob(){
  const params =
    new URLSearchParams(window.location.search);
  const id =
    params.get("id") || "41";
  const response =
    await fetch(`/jobdata/${id}.json`);
  currentJob =
    await response.json();
  document.title =
    `Jobbkort ${currentJob.nummer}`;
  document.getElementById("jobTitle").innerText =
    `JOBBKORT ${currentJob.nummer} - ${currentJob.titel.toUpperCase()}`;
  document.getElementById("frequency").innerText =
    currentJob.frekvens;
if(currentJob.merk){

  document.getElementById("merkText").innerHTML =
    "<strong>MERK:</strong> " + currentJob.merk;

}else{

  document.getElementById("merkText").style.display = "none";

}
  document.getElementById("notatInfo").innerText =
    currentJob.notatInfo;
  const container =
    document.getElementById("taskContainer");
  container.innerHTML = "";
currentJob.oppgaver.forEach(task => {

  // Gruppe med overskrift
  if (typeof task === "object" && task.punkter) {

    const heading =
      document.createElement("h3");

    heading.className = "taskHeading";
    heading.innerText = task.overskrift;

    container.appendChild(heading);

    if(task.tekst){

      const tekst =
        document.createElement("div");

      tekst.style.marginBottom = "10px";
      tekst.style.lineHeight = "1.5";

      tekst.innerHTML = task.tekst;

      container.appendChild(tekst);

    }

    task.punkter.forEach(punkt => {

      const label =
        document.createElement("label");

      label.innerHTML =
        `<input type="checkbox" class="task" disabled> ${punkt}`;

      container.appendChild(label);

    });

  }

  // Ren tekst uden checkbox
  else if (
    typeof task === "object" &&
    task.tekst
  ) {

    const tekst =
      document.createElement("div");

    tekst.style.margin = "10px 0";
    tekst.style.lineHeight = "1.5";

    tekst.innerHTML = task.tekst;

    container.appendChild(tekst);

  }

  // Almindelig checkbox
  else {

    const label =
      document.createElement("label");

    label.innerHTML =
      `<input type="checkbox" class="task" disabled> ${task}`;

    container.appendChild(label);

  }

});
}
function startWork(){
  startTime = Date.now();
  document
    .querySelectorAll(".task")
    .forEach(x => x.disabled = false);
  document.getElementById("nameInput").disabled = false;
  document.getElementById("notes").disabled = false;
  document.getElementById("photos").disabled = false;
document.getElementById("startBtn").style.display = "none";

const finishBtn =
  document.getElementById("finishBtn");

finishBtn.style.display = "block";
finishBtn.classList.add("pulse");
  timerInterval = setInterval(() => {
    const diff = Date.now() - startTime;
    const h =
      Math.floor(diff / 3600000);
    const m =
      Math.floor((diff % 3600000) / 60000);
    const s =
      Math.floor((diff % 60000) / 1000);
    document.getElementById("timeInput").value =
      String(h).padStart(2,"0") + ":" +
      String(m).padStart(2,"0") + ":" +
      String(s).padStart(2,"0");
  },1000);
}

document
  .getElementById("photos")
  .addEventListener("change", e => {
    selectedPhotos =
      selectedPhotos.concat(
        Array.from(e.target.files)
      );
    e.target.value = "";
    renderPreview();
});

document.getElementById("notes").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";
});
function renderPreview(){
  const preview =
    document.getElementById("preview");
  preview.innerHTML = "";
  selectedPhotos.forEach((file,index)=>{
    const url =
      URL.createObjectURL(file);
    preview.innerHTML += `
      <div class="previewItem">
        <img src="${url}">
        <button
          class="removeBtn"
          onclick="removePhoto(${index})">
          ×
        </button>
      </div>
    `;
  });
}
function removePhoto(index){
  selectedPhotos.splice(index,1);
  renderPreview();
}
document
  .getElementById("startBtn")
  .addEventListener("click", startWork);
document
  .getElementById("finishBtn")
  .addEventListener("click", () => {

    const navn =
      document.getElementById("nameInput")
      .value
      .trim();

    if(!navn){

      alert("Vennligst fyll ut navn.");

      document
        .getElementById("nameInput")
        .focus();

      return;
    }

    generatePDF();

  });
  async function generatePDF(){

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  let y = 15;

  doc.setFontSize(18);
  doc.text(
    `JOBBKORT ${currentJob.nummer}`,
    10,
    y
  );

  y += 10;

  doc.setFontSize(14);
  doc.text(
    currentJob.titel.toUpperCase(),
    10,
    y
  );

  y += 15;

  const navn =
    document.getElementById("nameInput").value;

  const tid =
    document.getElementById("timeInput").value;

const datoObj = new Date();

const dato =
  String(datoObj.getDate()).padStart(2,"0") + "." +
  String(datoObj.getMonth()+1).padStart(2,"0") + "." +
  datoObj.getFullYear();

  doc.setFontSize(11);

  doc.text(`Navn: ${navn}`,10,y);
  y += 8;

  doc.text(`Dato: ${dato}`,10,y);
  y += 8;

  doc.text(`Tid brukt: ${tid}`,10,y);
  y += 15;

doc.setFontSize(13);

doc.setFont(undefined,"bold");

doc.text("KONTROLLISTE",10,y);

y += 12;

doc.setFontSize(11);
    
let taskIndex = 0;

currentJob.oppgaver.forEach(item => {

  // Gruppe med overskrift
  if (typeof item === "object" && item.punkter) {

    doc.setFontSize(12);
    doc.setFont(undefined,"bold");

    doc.text(
      item.overskrift.toUpperCase(),
      10,
      y
    );

    y += 10;

    // Valgfri tekst under overskrift
    if(item.tekst){

      doc.setFontSize(11);
      doc.setFont(undefined,"normal");

      const tekstLinjer =
        doc.splitTextToSize(
          item.tekst.replace(/<[^>]*>/g, ""),
          180
        );

      doc.text(tekstLinjer,10,y);

      y += (tekstLinjer.length * 6) + 4;

    }

    item.punkter.forEach(tekst => {

      const linjer =
        doc.splitTextToSize(tekst,120);

      const task =
        document.querySelectorAll(".task")[taskIndex];

      taskIndex++;

      if(task && task.checked){

        doc.setFont(undefined,"bold");
        doc.setTextColor(0,160,0);
        doc.text("UTFØRT",10,y);

      }else{

        doc.setFont(undefined,"bold");
        doc.setTextColor(200,0,0);
        doc.text("IKKE UTFØRT",10,y);

      }

      doc.setTextColor(0,0,0);
      doc.setFont(undefined,"normal");

      doc.text(
        linjer,
        55,
        y
      );

      y += (linjer.length * 6) + 10;

      if(y > 260){

        doc.addPage();
        y = 20;

      }

    });

    y += 4;

  }

  // Fritstående tekst uden checkbox
  else if (
    typeof item === "object" &&
    item.tekst
  ) {

    doc.setFont(undefined,"normal");

    const tekstLinjer =
      doc.splitTextToSize(
        item.tekst.replace(/<[^>]*>/g, ""),
        180
      );

    doc.text(tekstLinjer,10,y);

    y += (tekstLinjer.length * 6) + 8;

  }

  // Almindelig checkbox-opgave
  else {

    const tekst =
      String(item);

    const linjer =
      doc.splitTextToSize(tekst,120);

    const task =
      document.querySelectorAll(".task")[taskIndex];

    taskIndex++;

    if(task && task.checked){

      doc.setFont(undefined,"bold");
      doc.setTextColor(0,160,0);
      doc.text("UTFØRT",10,y);

    }else{

      doc.setFont(undefined,"bold");
      doc.setTextColor(200,0,0);
      doc.text("IKKE UTFØRT",10,y);

    }

    doc.setTextColor(0,0,0);
    doc.setFont(undefined,"normal");

    doc.text(
      linjer,
      55,
      y
    );

    y += (linjer.length * 6) + 10;

  }

});
      
  doc.setFontSize(13);
  
  doc.setFont(undefined,"bold");
  
  doc.text("NOTATER",10,y);

doc.setFontSize(11);

  y += 8;

  doc.setFont(undefined,"normal");

  const notater =
    document.getElementById("notes").value || "-";

  const noteLines =
    doc.splitTextToSize(notater,180);

  doc.text(noteLines,10,y);

  y += (noteLines.length * 6) + 10;

  doc.text(
    `Vedlagte bilder: ${selectedPhotos.length}`,
    10,
    y
  );

  const pdfBlob = doc.output("blob");

const formData = new FormData();

formData.append(
  "file",
  pdfBlob,
  `Jobbkort-${currentJob.nummer}.pdf`
);

selectedPhotos.forEach(photo => {
  formData.append(
    "photos",
    photo,
    photo.name
  );
});

const status =
  document.getElementById("status");

status.innerHTML = "Sender rapport...";

try{
const finishBtn =

  document.getElementById("finishBtn");

finishBtn.disabled = true;

finishBtn.innerHTML = "⏳ Sender rapport...";
  const response =
    await fetch(
      "https://jobbkort-mail.nichlasfrydkaer.workers.dev/",
      {
        method:"POST",
        body:formData
      }
    );

  if(!response.ok){
    throw new Error("Upload feilet");
  }

  status.innerHTML =
    "Rapport sendt!";

  setTimeout(() => {
    window.location.href =
      "ferdig.html";
  },1000);

}catch(err){

  console.error(err);

  const finishBtn =
    document.getElementById("finishBtn");

  finishBtn.disabled = false;
  finishBtn.innerHTML = "✓ Ferdigmeld";

  status.innerHTML =
    "Feil ved sending.";

}

}
loadJob();
</script>
</body>
</html>
