<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobbkort</title>
<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
  id="appleAppTitle"
  name="apple-mobile-web-app-title"
  content="Jobbkort">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
*{
  box-sizing:border-box;
}
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#f4f6f8;
  padding-bottom:120px;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
}

#jobTitle{
  overflow-wrap:break-word;
  word-break:normal;
  line-height:1.15;
  text-wrap:balance;
}

#jobSubtitle{
  font-weight:bold;
  font-size:18px;
  margin-bottom:15px;
}
  
.section{
  margin-top:20px;
  padding-bottom:15px;
  border-bottom:1px solid #ddd;
}
input[type="text"],
textarea{
  width:100%;
  max-width:100%;
  padding:12px;
  font-size:16px;
  border:2px solid #ccc;
  border-radius:6px;
}

textarea{
  min-height:100px;
  resize:none;
  overflow:hidden;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
#startBtn{
  background:#2563eb;
  color:white;
}

#finishBtn{
  background:#28a745;
  color:white;
  display:none;
}
.notesInfo{
  font-size:14px;
  line-height:1.4;
  margin-bottom:10px;
  padding:10px;
  background:#f8f9fa;
  border-left:4px solid #28a745;
}
label{
  display:block;
  margin:10px 0;
  line-height:1.4;
}
.pulse{
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.03)}
  100%{transform:scale(1)}
}
#preview{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}
.previewItem{
  position:relative;
}
.previewItem img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}
.removeBtn{
  position:absolute;
  top:5px;
  right:5px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
}
#status{
  margin-top:15px;
  font-weight:bold;
  text-align:center;
}

.actionBar{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:100%;
  max-width:900px;
  padding:12px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  box-shadow:0 -4px 20px rgba(0,0,0,.12);
  z-index:999;
}

.actionBar button{
  width:100%;
  margin:0;
  border-radius:14px;
  font-size:18px;
  padding:18px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">
<h1 id="jobTitle">Laster...</h1>
  
<div id="jobSubtitle"></div>
  
<div class="section">
<strong id="frequencyLabel">Frekvens:</strong>
  <span id="frequency"></span>
</div>
<div class="section" id="timeSection">
  <strong id="timeLabel">Tid brukt</strong>
  <input type="text" id="timeInput" disabled>
</div>
<div class="section" id="nameSection">
  <strong id="nameLabel">Navn</strong>
  <input type="text" id="nameInput" disabled>
</div>
<div class="section">
  <div class="notesInfo" id="merkText"></div>

<strong id="checklistLabel">Kontrolliste</strong>

  <div id="taskContainer"></div>
</div>
<div class="section" id="commentsSection">

<strong id="notesLabel">Notater</strong>

  <div class="notesInfo" id="notatInfo"></div>
  <textarea id="notes" disabled></textarea>
</div>
<div class="section" id="photosSection">

  <strong id="photosLabel">Bilder</strong>

  <input
    type="file"
    id="photos"

    multiple

    accept="image/*"

    disabled

  >

  <div id="preview"></div>

</div>
<div id="status"></div>
</div>

<div class="actionBar">

  <button id="startBtn" class="pulse">
    ▶ Start arbeidet
  </button>

  <button id="finishBtn">
    ✓ Ferdigmeld
  </button>

</div>

<script type="module">
import { renderTasks } from "/motor/render.js";
import { generatePDF } from "/motor/pdf.js";
import {
  startTimer
} from "/motor/timer.js";  
import {
  initPhotos,
  autoResizeNotes
} from "/motor/photos.js";  
import {
  fitJobTitle,
  initTitle
} from "/motor/title.js";  
import { state } from "/motor/state.js";
import { dom } from "/motor/dom.js";  

renderTasks();

if(
  state.currentCongregation &&
  !state.currentCongregation.settings.allowPhotos
){

  document.getElementById(
    "photosSection"
  ).style.display = "none";

}

if(
  state.currentCongregation &&
  !state.currentCongregation.settings.allowComments
){

  document.getElementById(
    "commentsSection"
  ).style.display = "none";

}

if(
  state.currentCongregation &&
  !state.currentCongregation.settings.showTime
){

  document.getElementById(
    "timeSection"
  ).style.display = "none";

}

if(
  state.currentCongregation &&
  !state.currentCongregation.settings.showName
){

  document.getElementById(
    "nameSection"
  ).style.display = "none";

}

requestAnimationFrame(fitJobTitle);

}
function startWork(){

  startTimer();
  
  document
    .querySelectorAll(".task")
    .forEach(x => x.disabled = false);
if(
  !state.currentCongregation ||
  state.currentCongregation.settings.showName
){
  dom.nameInput.disabled = false;
}

if(
  !state.currentCongregation ||
  state.currentCongregation.settings.allowComments
){
  dom.notes.disabled = false;
}

if(
  !state.currentCongregation ||
  state.currentCongregation.settings.allowPhotos
){
  dom.photos.disabled = false;
}
dom.startBtn.style.display = "none";

const finishBtn =
  dom.finishBtn;

finishBtn.style.display = "block";
finishBtn.classList.add("pulse");
}
  
document
  .getElementById("startBtn")
  .addEventListener("click", startWork);
document
  .getElementById("finishBtn")
  .addEventListener("click", () => {

    const navn =
      dom.nameInput
      .value
      .trim();

    if(!navn){

  alert(state.translations.alertNameRequired);

  document
    .getElementById("nameInput")
    .focus();

  return;

}

generatePDF();

});

initTitle();  

initPhotos();
autoResizeNotes();
  
loadJob();
</script>
</body>
</html>
