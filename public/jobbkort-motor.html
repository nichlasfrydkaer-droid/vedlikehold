<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobbkort</title>
<link rel="stylesheet" href="/style.css">  
<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
  id="appleAppTitle"
  name="apple-mobile-web-app-title"
  content="Jobbkort">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div class="container">
<h1 id="jobTitle">Laster...</h1>
  
<div id="jobSubtitle"></div>
  
<div class="section">
<strong id="frequencyLabel">Frekvens:</strong>
  <span id="frequency"></span>
</div>
<div class="section" id="timeSection">
  <strong id="timeLabel">Tid brukt</strong>
  <input type="text" id="timeInput" disabled>
</div>
<div class="section" id="nameSection">
  <strong id="nameLabel">Navn</strong>
  <input type="text" id="nameInput" disabled>
</div>
<div class="section">
  <div class="notesInfo" id="merkText"></div>

<strong id="checklistLabel">Kontrolliste</strong>

  <div id="taskContainer"></div>
</div>
<div class="section" id="commentsSection">

<strong id="notesLabel">Notater</strong>

  <div class="notesInfo" id="notatInfo"></div>
  <textarea id="notes" disabled></textarea>
</div>
<div class="section" id="photosSection">

  <strong id="photosLabel">Bilder</strong>

  <input
    type="file"
    id="photos"

    multiple

    accept="image/*"

    disabled

  >

  <div id="preview"></div>

</div>
<div id="status"></div>
</div>

<div class="actionBar">

  <button id="startBtn" class="pulse">
    ▶ Start arbeidet
  </button>

  <button id="finishBtn">
    ✓ Ferdigmeld
  </button>

</div>

<script type="module">
import { initApp } from "/motor/app.js";

initApp();
</script>
</body>
</html>
