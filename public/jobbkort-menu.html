<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobbkort</title>

<link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
  id="appleAppTitle"
  name="apple-mobile-web-app-title"
  content="Jobbkort">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>

body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

#title{
  text-align:center;
  margin-bottom:25px;
  overflow-wrap:break-word;
  word-break:normal;
  text-wrap:balance;
  line-height:1.15;
}

button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.openBtn{
  background:#28a745;
  color:white;
}

.docBtn{
  background:#007bff;
  color:white;
}

button:hover{
  opacity:.95;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1 id="title">Laster...</h1>

    <button class="openBtn" id="openBtn">
      Åpne jobbkort
    </button>

    <button class="docBtn" id="printBtn">
      Skriv ut
    </button>

    <button class="docBtn" id="sjaBtn">
      Sikker jobb analyse
    </button>

<button class="docBtn" id="sjaGuideBtn">
  Veiledning: Sikker jobb-analyse (DC-85)
</button>

    <button class="docBtn" id="safeWorkBtn">
      Veiledning: Arbeid trygt sammen (DC-82)
    </button>

  </div>

</div>

<script>

let translations = null;

function fitJobTitle(){

  const title =
    document.getElementById("title");

  title.style.fontSize = "";

  let size =
    parseFloat(
      getComputedStyle(title).fontSize
    );

  const lineHeight =
    parseFloat(
      getComputedStyle(title).lineHeight
    );

  const maxHeight =
    (lineHeight * 2) + 2;

  while(
    title.scrollHeight > maxHeight &&
    size > 18
  ){

    size--;

    title.style.fontSize =
      size + "px";

  }

}

window.addEventListener(
  "resize",
  fitJobTitle
);

async function loadTranslations(language){

  let response =
    await fetch(`/lang/${language}.json`);

  if(!response.ok){

    response =
      await fetch("/lang/no.json");

  }

  translations =
    await response.json();

  document.title =
    translations.jobCard;

  document
    .getElementById("appleAppTitle")
    .setAttribute(
      "content",
      translations.jobCard
    );

  document.getElementById("openBtn").innerText =
    translations.openJob;

  document.getElementById("printBtn").innerText =
    translations.print;

  document.getElementById("sjaBtn").innerText =
    translations.sja;

  document.getElementById("sjaGuideBtn").innerText =
    translations.sjaGuide;

  document.getElementById("safeWorkBtn").innerText =
    translations.safeWork;

}

async function loadMenu(){

  const params =
    new URLSearchParams(window.location.search);

  const jobId =
    params.get("id") || "41";

  const congregation =
    params.get("congregation");

  let language = "no";

  if(congregation){

    const congregationResponse =
      await fetch(
        "https://api.vedlikeholdsystem.no/congregations"
      );

    const congregations =
      await congregationResponse.json();

    const currentCongregation =
      congregations.find(
        c => c.id === congregation
      );

    language =
      currentCongregation?.language || "no";

  }

  await loadTranslations(language);

  let response =
    await fetch(`/jobdata/${language}/${jobId}.json`);

  if(!response.ok){

    throw new Error("Jobbkort ikke funnet.");

  }

  const job =
    await response.json();

  document.getElementById("title").innerText =
    `${translations.jobCard} ${job.nummer} - ${job.titel.toUpperCase()}`;

  requestAnimationFrame(fitJobTitle);

  document.getElementById("openBtn").onclick = () => {

    location.href =
      `/jobbkort-motor.html?id=${job.nummer}&congregation=${congregation}`;

  };

  document.getElementById("printBtn").onclick = () => {

    window.open(
      `/pdf/${language}/${job.jobbkortPdf}`,
      "_blank"
    );

  };

  document.getElementById("sjaBtn").onclick = () => {

    window.open(
      `/dokumenter/${language}/${job.sjaPdf}`,
      "_blank"
    );

  };

  document.getElementById("sjaGuideBtn").onclick = () => {

    window.open(
      `/dokumenter/${language}/${job.sjaVeiledningPdf}`,
      "_blank"
    );

  };

  document.getElementById("safeWorkBtn").onclick = () => {

    window.open(
      `/dokumenter/${language}/${job.arbeidTrygtPdf}`,
      "_blank"
    );

  };

}

loadMenu();

</script>
  
</body>
</html>
