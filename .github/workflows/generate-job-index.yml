name: Generate Job Index

on:
  push:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate index.json files
        run: |
          python3 << 'EOF'
          import json
          import glob
          import os
          import re

          def sort_key(job):
              match = re.match(r"(\d+)(.*)", str(job["nummer"]))

              if match:
                  number = int(match.group(1))
                  suffix = match.group(2)
                  return (number, suffix)

              return (9999, "")

          language_folders = glob.glob("public/jobdata/*")

          for folder in language_folders:

              if not os.path.isdir(folder):
                  continue

              jobs = []

              for file in glob.glob(f"{folder}/*.json"):

                  if file.endswith("index.json"):
                      continue

                  try:
                      with open(file, "r", encoding="utf-8") as f:
                          data = json.load(f)

                      jobs.append({
                          "nummer": str(data.get("nummer", "")),
                          "titel": data.get("titel", "")
                      })

                  except Exception as e:
                      print(f"Fejl i {file}: {e}")

              jobs.sort(key=sort_key)

              index_file = os.path.join(folder, "index.json")

              with open(index_file, "w", encoding="utf-8") as f:
                  json.dump(jobs, f, ensure_ascii=False, indent=2)

              print(f"Genererede {index_file} med {len(jobs)} jobbkort")

          EOF

      - name: Commit updated index.json files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/jobdata/*/index.json

          if ! git diff --cached --quiet; then
            git commit -m "Auto-update job indexes"
            git pull --rebase
            git push
          fi
