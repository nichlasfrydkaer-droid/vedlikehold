name: Generate Job Index

on:
  push:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate index.json
        run: |
          python3 << 'EOF'
          import json
          import glob
          import re

          jobs = []

          for file in glob.glob("public/jobdata/no/*.json"):
              if file.endswith("index.json"):
                  continue

              try:
                  with open(file, "r", encoding="utf-8") as f:
                      data = json.load(f)

                  jobs.append({
                      "nummer": str(data.get("nummer", "")),
                      "titel": data.get("titel", "")
                  })

              except Exception as e:
                  print(f"Fejl i {file}: {e}")

          def sort_key(job):
              match = re.match(r"(\d+)(.*)", str(job["nummer"]))

              if match:
                  number = int(match.group(1))
                  suffix = match.group(2)
                  return (number, suffix)

              return (9999, "")

          jobs.sort(key=sort_key)

          with open("public/jobdata/no/index.json", "w", encoding="utf-8") as f:
              json.dump(jobs, f, ensure_ascii=False, indent=2)

          print(f"Genererede index.json med {len(jobs)} jobbkort")
          EOF

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/jobdata/no/index.json

          if ! git diff --cached --quiet; then
          git commit -m "Auto-update job index"
          git pull --rebase
          git push
          fi
